name: China Tax & Corporate Law Watch

on:
  schedule:
    # Hebdomadaire, lundi 05:00 UTC (le droit fiscal/societes chinois evolue
    # plus lentement que l'actualite concurrentielle : cadence hebdo pour
    # limiter la consommation d'appels API DeepSeek/Tavily)
    - cron: "0 5 * * 1"
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Executer en mode test (perimetre reduit, verifications rapides)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run China tax & corporate law watch agent
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            python china_tax_law_agent.py --test
          else
            python china_tax_law_agent.py
          fi

      - name: Upload generated reports as artifact
        uses: actions/upload-artifact@v4
        with:
          name: china-tax-law-reports-${{ github.run_id }}
          path: reports/*.html
          retention-days: 90

      - name: Commit reports and state back to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ data/
          if git diff --cached --quiet; then
            echo "Aucun changement a committer."
          else
            git commit -m "chore: rapport de veille fiscalite/droit Chine du $(date -u +'%Y-%m-%d') [skip ci]"
            git push
          fi
